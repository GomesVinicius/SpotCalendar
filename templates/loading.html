<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coletando músicas…</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1f1e1e;color:#f0f0f0;
     min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#272626;border:1px solid #333;border-radius:20px;padding:40px 36px;
      max-width:440px;width:100%;text-align:center}
.logo{color:#1DB954;font-size:44px;margin-bottom:20px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
h1{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px}
.sub{font-size:13px;color:#aaa;margin-bottom:24px;line-height:1.6}
.bar-wrap{background:#1a1a1a;border-radius:50px;height:6px;overflow:hidden;margin-bottom:8px}
.bar{height:100%;background:#1DB954;border-radius:50px;
     width:5%;margin-left:0;transition:width .4s ease,margin-left .4s ease;
     animation:indeterminate 1.4s ease-in-out infinite}
.bar.live{animation:none}
@keyframes indeterminate{
  0%  {width:5%;margin-left:0}
  50% {width:40%;margin-left:30%}
  100%{width:5%;margin-left:95%}
}
.status{font-size:12px;color:#666;min-height:18px;margin-bottom:16px}
.playlist-list{max-height:220px;overflow-y:auto;text-align:left;margin-bottom:16px;
  scrollbar-width:thin;scrollbar-color:#333 transparent}
.playlist-list:empty{display:none}
.pl-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;
  font-size:13px;color:#ccc;animation:fadeIn .25s ease}
.pl-item:nth-child(odd){background:#1f1f1f}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.pl-icon{flex-shrink:0;font-size:16px}
.pl-icon.done{color:#1DB954}
.pl-icon.spin{color:#555;display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pl-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-total{font-size:11px;color:#555;flex-shrink:0}
.btn-calendar{display:inline-flex;align-items:center;gap:8px;background:#1DB954;color:#000;
  font-weight:700;font-size:14px;border-radius:50px;padding:12px 28px;text-decoration:none;
  margin-bottom:16px;animation:fadeIn .3s ease;transition:background .15s,transform .1s}
.btn-calendar:hover{background:#1ed760;transform:scale(1.03)}
.gh-link{margin-top:8px;font-size:11px;display:flex;align-items:center;justify-content:center;gap:8px}
.gh-link a{color:#555;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:color .15s}
.gh-link a:hover{color:#aaa}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><i class="ti ti-brand-spotify"></i></div>
  <h1>Coletando suas músicas</h1>
  <div class="sub">Estamos lendo todas as suas playlists do Spotify.<br>Isso pode levar alguns segundos.</div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="status" id="status">Aguardando...</div>
  <div class="playlist-list" id="list"></div>
  <div class="gh-link">
    <a href="/privacy"><i class="ti ti-shield-check"></i> Privacidade</a>
    <span style="color:#333">·</span>
    <a href="https://github.com/GomesVinicius" target="_blank" rel="noopener"><i class="ti ti-brand-github"></i> GomesVinicius</a>
  </div>
</div>
<script>
const USER_ID = '{{ user_id }}';
const LS_KEY  = 'spotify_cal_' + USER_ID;
const FORCE   = '{{ force }}' === 'true';

const statusEl = document.getElementById('status');
const barEl    = document.getElementById('bar');
const listEl   = document.getElementById('list');
const rendered = new Set(); // nomes já na lista

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }

function upsertItem(name, done, total) {
  if (rendered.has(name)) {
    // Atualiza ícone para check
    const el = document.querySelector(`[data-pl="${CSS.escape(name)}"]`);
    if (el) {
      el.querySelector('.pl-icon').className = 'pl-icon done';
      el.querySelector('.pl-icon').innerHTML = '<i class="ti ti-circle-check-filled"></i>';
      if (total != null) el.querySelector('.pl-total').textContent = total + ' músicas';
    }
    return;
  }
  rendered.add(name);
  const div = document.createElement('div');
  div.className = 'pl-item';
  div.dataset.pl = name;
  div.innerHTML = `
    <span class="pl-icon ${done ? 'done' : 'spin'}">
      <i class="ti ${done ? 'ti-circle-check-filled' : 'ti-loader-2'}"></i>
    </span>
    <span class="pl-name">${esc(name)}</span>
    <span class="pl-total">${total != null ? total + ' músicas' : ''}</span>
  `;
  listEl.appendChild(div);
  listEl.scrollTop = listEl.scrollHeight;
}

function setBar(pct) {
  barEl.classList.add('live');
  barEl.style.width = pct + '%';
}

function hasLocalCache() {
  try {
    const d = JSON.parse(localStorage.getItem(LS_KEY));
    return d && d.tracks && d.tracks.length > 0;
  } catch(e) { return false; }
}

// Polling de progresso — roda enquanto o /api/collect está bloqueado
function startPolling() {
  const iv = setInterval(() => {
    fetch('/api/collect/progress')
      .then(r => r.json())
      .then(p => {
        const total = p.total || 1;
        const done  = (p.done || []).length;

        // Playlists concluídas
        (p.done || []).forEach(pl => upsertItem(pl.name, true, pl.total));

        // Playlist atual (em andamento)
        if (p.current) upsertItem(p.current, false, null);

        setBar(Math.round((done / total) * 100));
        statusEl.textContent = done > 0
          ? `Lida ${done} de ${total} playlists…`
          : 'Conectando ao Spotify...';

        if (p.finished) clearInterval(iv);
      })
      .catch(() => {});
  }, 600);
}

async function doCollect() {
  statusEl.textContent = 'Conectando ao Spotify...';
  startPolling();

  try {
    const r    = await fetch('/api/collect', { method: 'POST' });
    const data = await r.json();

    if (data.error) {
      statusEl.textContent = 'Erro: ' + data.error;
      return;
    }

    setBar(100);
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        user_id: USER_ID, saved_at: new Date().toISOString(), tracks: data.tracks
      }));
    } catch(e) { console.warn('[LS]', e); }

    statusEl.textContent = data.total + ' músicas salvas!';
    const btn = document.createElement('a');
    btn.href = '/calendar';
    btn.className = 'btn-calendar';
    btn.innerHTML = '<i class="ti ti-calendar"></i> Ver calendário';
    listEl.insertAdjacentElement('afterend', btn);

  } catch(e) {
    statusEl.textContent = 'Erro de conexão. Tente novamente.';
  }
}

if (!FORCE && hasLocalCache()) {
  statusEl.textContent = 'Cache encontrado, carregando...';
  window.location.href = '/calendar';
} else {
  doCollect();
}
</script>
</body>
</html>
